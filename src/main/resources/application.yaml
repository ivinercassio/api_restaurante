spring:
  application:
    name: restaurante

  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/restaurante}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: create-drop 
      # ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        #dialect: org.hibernate.dialect.MySQLDialect

api:
  security:
    token:
      secret: ${SECURITY_TOKEN_KEY:segredo}
